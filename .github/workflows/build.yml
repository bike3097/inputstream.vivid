name: Build InputStream Vivid
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 下载Kodi 21 (Omega) 源码（仅用头文件，不编译）
      - name: Get Kodi Source
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: Omega
          path: kodi_src
          fetch-depth: 1

      # 安装ARMv7交叉编译工具
      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf cmake build-essential

      # 交叉编译（核心：指定KODI_SOURCE_DIR，无find_package依赖）
      - name: Build Addon
        run: |
          cmake -B build -S . \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=arm \
            -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc \
            -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++ \
            -DKODI_SOURCE_DIR=${{ github.workspace }}/kodi_src
          cmake --build build --config Release --parallel

      # 打包Kodi标准插件
      - name: Package Addon
        run: |
          VERSION=$(grep 'version="' addon.xml | grep -v '<?xml' | head -n1 | sed 's/.*version="\([^"]*\)".*/\1/')
          ADDON_ID="inputstream.vivid"
          mkdir -p $ADDON_ID
          cp addon.xml $ADDON_ID/
          cp build/$ADDON_ID.so $ADDON_ID/
          mkdir -p staging
          mv $ADDON_ID staging/
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # 上传编译产物（可直接在CoreELEC安装）
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: inputstream.vivid-${{ env.VERSION }}-linux-armv7
          path: staging/
