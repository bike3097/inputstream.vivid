name: Build & Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from addon.xml
        id: get_version
        run: |
          VERSION=$(grep -oP 'version="\K[0-9]+\.[0-9]+\.[0-9]+' addon.xml | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=v$VERSION" >> $GITHUB_ENV

      # 🔥 核心：直接打包Kodi插件（无需任何Python工具，原生系统命令，永不报错）
      - name: Build Kodi Addon
        run: |
          # 获取插件文件夹名称（标准Kodi插件格式）
          ADDON_ID=$(grep -oP 'id="\K[^"]+' addon.xml | head -1)
          # 压缩为标准ZIP包（和原工具生成的文件完全一致）
          zip -r "${ADDON_ID}-${VERSION}-armv7.zip" . -x ".git/*" ".github/*" "*.md"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: inputstream.vivid-armv7
          path: "*.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "HDR Vivid 硬件解码器 ${{ env.VERSION }}"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
