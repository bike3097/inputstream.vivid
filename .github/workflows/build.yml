name: Build InputStream Vivid Addon
on: [push, pull_request]

jobs:
  build:
    name: Build Linux-armv7
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: armv7
            triplet: arm-linux
            cmake-args: -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=arm -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Kodi Source
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: Omega
          path: kodi_src
          fetch-depth: 1

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'aebdcca3833a60ad33e4ce848437eee434669ed4'
          vcpkgDirectory: ${{ github.workspace }}/vcpkg

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config build-essential gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Configure and Build
        shell: bash
        run: |
          cmake -B build -S . \
            -DCMAKE_TOOLCHAIN_FILE=vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DKODI_SOURCE_DIR=kodi_src \
            ${{ matrix.cmake-args }}
          cmake --build build --config Release --parallel

      - name: Prepare Package
        shell: bash
        run: |
          VERSION=$(grep 'version="' addon.xml | grep -v '<?xml' | head -1 | sed -n 's/.*version="\([^"]*\)".*/\1/p')
          ADDON_ID="inputstream.vivid"
          mkdir -p $ADDON_ID
          cp addon.xml $ADDON_ID/
          find build -name "*.so" -exec cp {} $ADDON_ID/$ADDON_ID.so \;
          mkdir -p staging
          mv $ADDON_ID staging/
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: inputstream.vivid-${{ env.VERSION }}-linux-armv7
          path: staging/
