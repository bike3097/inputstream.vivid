name: Build InputStream Vivid
on: [push, pull_request]

jobs:
  build:
    name: Build Linux-armv7
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: armv7
            cmake-args: -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=arm -DCMAKE_C_COMPILER=arm-linux-gnueabihf-gcc -DCMAKE_CXX_COMPILER=arm-linux-gnueabihf-g++

    steps:
      - uses: actions/checkout@v4

      # 下载Kodi 21源码（模板原版）
      - name: Checkout Kodi Source
        uses: actions/checkout@v4
        with:
          repository: xbmc/xbmc
          ref: Omega
          path: kodi_src
          fetch-depth: 1

      # 安装ARM编译工具
      - name: Install Linux Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config build-essential gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      # 编译
      - name: Configure and Build
        shell: bash
        run: |
          cmake -B build -S . \
            -DKODI_SOURCE_DIR=${{ github.workspace }}/kodi_src \
            ${{ matrix.cmake-args }}
          cmake --build build --config Release --parallel

      # 打包插件
      - name: Prepare Artifacts
        shell: bash
        run: |
          ADDON_ID="inputstream.vivid"
          mkdir -p $ADDON_ID
          cp addon.xml $ADDON_ID/
          find build -name "*.so" -exec cp {} $ADDON_ID/$ADDON_ID.so \;
          mkdir -p staging
          mv $ADDON_ID staging/

      # 🔥 关键修改：无环境变量，固定产物名称
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: inputstream.vivid-linux-armv7
          path: staging/
