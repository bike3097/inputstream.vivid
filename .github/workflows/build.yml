name: Build & Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build tools
        run: |
          python -m pip install -U pip
          # ✅ 修复：从源码安装 kodi-addon-dev（唯一可行方式）
          python -m pip install git+https://github.com/xbmc/kodi-addon-dev.git

      - name: Read version from addon.xml
        id: get_version
        run: |
          VERSION=$(grep -oP 'version="\K[0-9]+\.[0-9]+\.[0-9]+' addon.xml | head -1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "TAG=v$VERSION" >> $GITHUB_ENV

      - name: Build for linux-arm (armv7)
        run: |
          kodi-addon-dev build --arch linux-arm --disable-pip-upgrade

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: inputstream.vivid-armv7
          path: "*.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "HDR Vivid 硬件解码器 ${{ env.VERSION }}"
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
